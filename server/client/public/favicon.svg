<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>ACTAS-FTSM</title>
  <!-- Background: UKM blue rounded square -->
  <rect width="32" height="32" rx="6" fill="#003082"/>

  <!-- Graduation cap board (flat mortarboard, rhombus shape) -->
  <polygon points="16,5 27,10.5 16,16 5,10.5" fill="#F5A623"/>

  <!-- Cap body (the cylindrical head below the board) -->
  <path d="M12,12 L12,19.5 Q16,22.5 20,19.5 L20,12 Z" fill="#F5A623" opacity="0.72"/>

  <!-- Tassel cord (from right corner of board downward) -->
  <line x1="27" y1="10.5" x2="27" y2="18.5"
        stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="27" cy="20.5" r="2" fill="#F5A623"/>

  <!-- Circuit trace: horizontal bus line -->
  <line x1="5" y1="27" x2="27" y2="27"
        stroke="#F5A623" stroke-width="0.75" opacity="0.38"/>
  <!-- Three circuit nodes -->
  <circle cx="7.5"  cy="27" r="1.5" fill="#F5A623" opacity="0.52"/>
  <circle cx="16"   cy="27" r="1.5" fill="#F5A623" opacity="0.52"/>
  <circle cx="24.5" cy="27" r="1.5" fill="#F5A623" opacity="0.52"/>
</svg>
