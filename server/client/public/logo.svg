<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 50">
  <title>ACTAS-FTSM</title>

  <!-- ── Icon mark (40×40 tile at top-left) ── -->
  <rect x="1" y="5" width="40" height="40" rx="8" fill="#003082"/>

  <!-- Cap board -->
  <polygon points="21,11 32,16.5 21,22 10,16.5" fill="#F5A623"/>

  <!-- Cap body -->
  <path d="M16.5,17 L16.5,25 Q21,27.5 25.5,25 L25.5,17 Z"
        fill="#F5A623" opacity="0.72"/>

  <!-- Tassel -->
  <line x1="32" y1="16.5" x2="32" y2="24"
        stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="26" r="2" fill="#F5A623"/>

  <!-- Circuit nodes -->
  <line x1="6" y1="37.5" x2="36" y2="37.5"
        stroke="#F5A623" stroke-width="0.75" opacity="0.35"/>
  <circle cx="9"  cy="37.5" r="1.5" fill="#F5A623" opacity="0.5"/>
  <circle cx="21" cy="37.5" r="1.5" fill="#F5A623" opacity="0.5"/>
  <circle cx="33" cy="37.5" r="1.5" fill="#F5A623" opacity="0.5"/>

  <!-- ── Word-mark ── -->
  <!-- "ACTAS" bold -->
  <text x="52" y="30"
    font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
    font-size="22" font-weight="800" fill="#003082" letter-spacing="-0.4">ACTAS</text>

  <!-- Gold accent dash + "FTSM" -->
  <rect x="52" y="34" width="20" height="2" rx="1" fill="#F5A623" opacity="0.7"/>
  <text x="75" y="43"
    font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif"
    font-size="10" font-weight="700" fill="#1a4fa8" letter-spacing="1.8">FTSM · UKM</text>
</svg>
